        #dsn-loader::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%); pointer-events: none; }
        .dots-wrap { display: flex; align-items: center; gap: 16px; position: relative; z-index: 2; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #00d4ff; box-shadow: 0 0 10px 3px rgba(0, 212, 255, 0.5); will-change: transform, opacity; animation: dotPulse 1.4s ease-in-out infinite; }

        .dot:nth-child(2) { animation-delay: 0.22s; }
        .dot:nth-child(3) { animation-delay: 0.44s; }
        @keyframes dotPulse { 0%, 100% { transform: scale(0.6); opacity: 0.25; box-shadow: 0 0 6px 2px rgba(0, 212, 255, 0.2); } 50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 18px 6px rgba(0, 212, 255, 0.6); } }

        .loader-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 400; color: rgba(0, 212, 255, 0.5); letter-spacing: 0.2em; text-transform: uppercase; }
        #dsn-error { position: fixed; inset: 0; z-index: 9001; background: linear-gradient(160deg, #0d1b3e 0%, #0a1628 50%, #061020 100%); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
        #dsn-error.visible { display: flex; }
        .error-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(220,50,50,0.15); border: 1.5px solid rgba(220,50,50,0.5); display: flex; align-items: center; justify-content: center; }
