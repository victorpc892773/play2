<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>

            const tituloParams = new URLSearchParams(window.location.search);
            const tituloId = tituloParams.get('id');
            if (tituloId) document.title = `ID PRM+: ${tituloId}`;
        })();

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
        }
        #player-container { position: absolute; inset: 0; }

        #loader {
            position: fixed; inset: 0;
            background: #080d1a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: clamp(16px, 3vw, 32px); z-index: 99;
        }
        .loader-ring {
            width: clamp(56px, 10vw, 90px);
            height: clamp(56px, 10vw, 90px);
            position: relative;
        }
        .loader-ring::before,
        .loader-ring::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            border: clamp(3px, 0.5vw, 5px) solid transparent;
        }
        .loader-ring::before {
            border-top-color: #0064FF;
            animation: spin 1s linear infinite;
        }
        .loader-ring::after {
            border-bottom-color: rgba(0,100,255,0.25);
            animation: spin 1.5s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-dots {
            display: flex; gap: clamp(6px, 1vw, 10px);
        }
        .loader-dots span {
            width: clamp(7px, 1.2vw, 11px);
            height: clamp(7px, 1.2vw, 11px);
            background: #0064FF;
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1.0); opacity: 1;   }
        }
        .loader-text {
            text-align: center; line-height: 1.7;
            animation: fadepulse 2s ease-in-out infinite;
        }
        .loader-text strong {
            display: block;
            font-size: clamp(1.2rem, 3.5vw, 2rem);
            color: #fff; margin-bottom: 4px;
        }
        .loader-text span {
            font-size: clamp(0.95rem, 2.5vw, 1.4rem);
            color: #8a9bb8;
        }
        @keyframes fadepulse {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 1;   }
        }

        #error-screen {
            position: fixed; inset: 0;
            background: #080d1a;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            gap: clamp(12px, 2.5vw, 22px); z-index: 99;
            padding: 24px;
        }
        .error-icon-wrap {
            width: clamp(52px, 9vw, 80px);
            height: clamp(52px, 9vw, 80px);
            background: rgba(220,53,53,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: errpulse 2s ease-in-out infinite;
        }
        @keyframes errpulse {
            0%, 100% { box-shadow: 0 0 0 0    rgba(220,53,53,0.3); }
            50%       { box-shadow: 0 0 0 14px rgba(220,53,53,0);   }
        }
        .error-icon-wrap svg {
            width: clamp(24px, 4vw, 38px);
            height: clamp(24px, 4vw, 38px);
        }
        .error-title {
            font-size: clamp(1.1rem, 3.5vw, 2rem);
            font-weight: 700;
            color: #fff; text-align: center;
            max-width: min(600px, 90vw);
            line-height: 1.4;
        }
        .error-sub {
            font-size: clamp(0.9rem, 2.2vw, 1.3rem);
            color: #8a9bb8;
            text-align: center;
            max-width: min(480px, 88vw);
            line-height: 1.7;
        }
        .btn-group {
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
            margin-top: 4px;
        }
        .retry-btn {
            background: transparent;
            color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: clamp(9px, 1.5vw, 14px) clamp(22px, 4vw, 36px);
            border-radius: 6px;
            font-size: clamp(0.88rem, 2vw, 1.15rem);
            font-weight: 600; width: 100%;
            cursor: pointer; transition: background 0.2s, border-color 0.2s;
            box-sizing: border-box;
        }
        .retry-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); }
        .events-btn {
            background: #0064FF;
            color: #fff; border: 1px solid #0064FF;
            padding: clamp(9px, 1.5vw, 14px) clamp(22px, 4vw, 36px);
            border-radius: 6px;
            font-size: clamp(0.88rem, 2vw, 1.15rem);
            font-weight: 600; width: 100%;
            cursor: pointer; transition: background 0.2s, border-color 0.2s;
            text-decoration: none; text-align: center;
            display: block; box-sizing: border-box;
        }
        .events-btn:hover { background: #0050cc; border-color: #0050cc; }
    </style>
</head>

        <div class="loader-ring"></div>
        <div class="loader-text">

        <div class="error-title">Esse evento ainda não começou ou já foi encerrado</div>

        </div>
    </div>
