    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            height: 100%;
            width: 100%;
            border: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #player.visible {
            opacity: 1;
        }

        #dsn-loader {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: linear-gradient(160deg, #0d1b3e 0%, #0a1628 50%, #061020 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #dsn-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #dsn-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(0, 180, 216, 0.08) 0%, transparent 65%);
            pointer-events: none;
        }

        #dsn-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
        }

        .dots-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d4ff;
            box-shadow: 0 0 10px 3px rgba(0, 212, 255, 0.5);
            will-change: transform, opacity;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.22s; }
        .dot:nth-child(3) { animation-delay: 0.44s; }

        @keyframes dotPulse {
            0%, 100% {
                transform: scale(0.6);
                opacity: 0.25;
                box-shadow: 0 0 6px 2px rgba(0, 212, 255, 0.2);
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
                box-shadow: 0 0 18px 6px rgba(0, 212, 255, 0.6);
            }
        }

        .loader-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 2;
        }

        .loader-text {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.88);
            letter-spacing: 0.04em;
        }

        .loader-sub {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: rgba(0, 212, 255, 0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #dsn-error {
            position: fixed;
            inset: 0;
            z-index: 9001;
            background: linear-gradient(160deg, #0d1b3e 0%, #0a1628 50%, #061020 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        #dsn-error.visible {
            display: flex;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(220,50,50,0.15);
            border: 1.5px solid rgba(220,50,50,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon svg {
            width: 22px;
            height: 22px;
            fill: #e05555;
        }

        .error-title {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            text-align: center;
            padding: 0 24px;
        }

        .error-sub {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            text-align: center;
            padding: 0 24px;
        }
        @media (min-width: 768px) {
            .loader-text  { font-size: 24px; }
            .loader-sub   { font-size: 16px; }
            .error-title  { font-size: 24px; }
            .error-sub    { font-size: 17px; }
            .dot          { width: 18px; height: 18px; }
        }
    #histats_counter {
      display: none;
    }
    </style>

    <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
    
      if (!id) return;
    
      function tryDecodeBase64(str) {
        if (str.length % 4 !== 0) return null;
        if (!/^[A-Za-z0-9+/]*={0,2}$/.test(str)) return null;
    
        try {
          const decoded = decodeURIComponent(escape(atob(str)));
          return decoded !== str ? decoded : null;
        } catch (e) {
          return null;
        }
      }
    
      const decoded = tryDecodeBase64(id);
      document.title = `ID: ${decoded ?? id}`;
    })();
    </script>
