html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
@viewport { width: device-width; }
#player { width: 100%; height: 100%; }

#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #000;
  z-index: 999;
  gap: 20px;
  transition: opacity 0.4s ease;
}
.loader-bars {
  display: flex; align-items: flex-end; gap: 8px; height: 56px;
}
.loader-bars span {
  display: block; width: 8px; border-radius: 4px; background: #fff;
  animation: barPulse 1.1s ease-in-out infinite;
}
.loader-bars span:nth-child(1) { animation-delay: 0s;    height: 28px; }
.loader-bars span:nth-child(2) { animation-delay: 0.15s; height: 42px; }
.loader-bars span:nth-child(3) { animation-delay: 0.3s;  height: 56px; }
.loader-bars span:nth-child(4) { animation-delay: 0.15s; height: 42px; }
.loader-bars span:nth-child(5) { animation-delay: 0s;    height: 28px; }
@keyframes barPulse {
  0%, 100% { opacity: 0.2; transform: scaleY(0.6); }
  50%       { opacity: 1;   transform: scaleY(1); }
}
#loading-text {
  color: rgba(255,255,255,0.45);
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 15px; letter-spacing: 0.22em; text-transform: uppercase;
}
#loading.error .loader-bars { display: none; }
#loading.error #loading-text {
  color: #ff4f4f; letter-spacing: 0.04em;
  text-transform: none; font-size: 14px;
}
#loading.unavailable .loader-bars { display: none; }
#loading.unavailable #loading-text {
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.02em;
  text-transform: none;
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  line-height: 1.7;
}
#unavailable-icon {
  display: none;
  font-size: 60px;
  line-height: 1;
}
#loading.unavailable #unavailable-icon { display: block; }
#histats_counter {
  display: none;
}
</style>
