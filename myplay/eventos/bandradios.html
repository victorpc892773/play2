<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carregando...</title>
  <link rel="icon" id="favicon" type="image/png" href="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0d0d1a;
    }

    #card {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 0.8s;
    }
    #bg.loaded { opacity: 1; }

    #bg-blur {
      position: absolute; inset: -20px;
      background-size: cover; background-position: center;
      filter: blur(28px) saturate(1.4);
      opacity: 0.55;
    }

    #bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,8,30,0.10) 0%,
        rgba(10,8,30,0.40) 40%,
        rgba(10,8,30,0.85) 68%,
        rgba(10,8,30,0.98) 100%
      );
    }

    #iframe-wrap {
      position: relative; z-index: 2;
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 3vw, 32px) clamp(18px, 5vw, 80px) 0;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    #iframe-wrap.visible { display: flex; }

    #spalla-iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      background: #000;
    }

    /* BOTTOM PLAYER AREA */
    #body {
      position: relative; z-index: 3;
      padding: clamp(12px, 2.5vw, 28px) clamp(18px, 5vw, 56px) clamp(16px, 4vw, 40px);
      padding-bottom: max(clamp(16px, 4vw, 40px), env(safe-area-inset-bottom));
      display: flex; flex-direction: column;
      gap: clamp(12px, 2.5vw, 22px);
      width: 100%; max-width: 860px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    #meta {
      display: flex; align-items: center;
      gap: clamp(12px, 3vw, 22px);
    }

    #thumb-wrap {
      flex-shrink: 0;
      width: clamp(80px, 20vw, 130px);
      height: clamp(80px, 20vw, 130px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      background: #1a1a3a;
    }
    #thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #meta-text { flex: 1; min-width: 0; }

    #radio-title {
      font-size: clamp(22px, 5.5vw, 46px);
      font-weight: 900; color: #fff;
      line-height: 1.1; letter-spacing: -0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    #radio-genre {
      font-size: clamp(11px, 2vw, 13px);
      font-weight: 600; color: rgba(255,255,255,0.45);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 8px;
    }

    #radio-category {
      display: inline-block;
      font-size: clamp(11px, 1.8vw, 13px); font-weight: 500;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 12px; border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    #player-bar {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: clamp(13px, 2.5vw, 18px) clamp(16px, 3vw, 26px);
      display: flex; align-items: center;
      gap: clamp(10px, 2vw, 18px);
    }

    #play-btn {
      width: clamp(44px, 7vw, 52px);
      height: clamp(44px, 7vw, 52px);
      border-radius: 50%; border: none; background: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, background 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #play-btn:hover { transform: scale(1.08); background: #e8e8ff; }
    #play-btn:active { transform: scale(0.96); }
    #play-btn svg { width: clamp(16px, 2.8vw, 20px); height: clamp(16px, 2.8vw, 20px); }

    #live-section { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    #live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
      animation: ripple 1.6s infinite;
    }
    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      70%  { box-shadow: 0 0 0 7px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }
    #live-label {
      font-size: clamp(11px, 1.8vw, 13px); font-weight: 700;
      color: #4ade80; letter-spacing: 1.5px;
    }

    #eq { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
    .eq-bar {
      width: 3px; border-radius: 2px; background: rgba(255,255,255,0.55);
      animation: eqAnim 0.7s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1){animation-duration:.55s;animation-delay:.00s}
    .eq-bar:nth-child(2){animation-duration:.85s;animation-delay:.10s}
    .eq-bar:nth-child(3){animation-duration:.65s;animation-delay:.05s}
    .eq-bar:nth-child(4){animation-duration:.95s;animation-delay:.15s}
    .eq-bar:nth-child(5){animation-duration:.50s;animation-delay:.08s}
    .eq-bar:nth-child(6){animation-duration:.75s;animation-delay:.12s}
    @keyframes eqAnim { from{height:2px;opacity:.4} to{height:18px;opacity:1} }
    .eq-bar.stopped { animation: none; height: 2px; opacity: 0.3; }

    #vol-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #vol-icon { width: 16px; height: 16px; fill: rgba(255,255,255,0.55); flex-shrink: 0; }
    #vol-slider {
      -webkit-appearance: none; appearance: none;
      width: clamp(70px, 11vw, 120px); height: 4px; border-radius: 4px;
      background: rgba(255,255,255,0.2); outline: none; cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; cursor: pointer;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }

    #desc-label {
      font-size: clamp(10px, 1.6vw, 11px); font-weight: 700;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 4px;
    }
    #desc-text {
      font-size: clamp(13px, 2.2vw, 15px);
      color: rgba(255,255,255,0.55); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    #loading-state {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 10; background: #0d0d1a;
    }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    #loading-state p { color: rgba(255,255,255,0.4); font-size: 13px; }

    @media (max-width: 400px) {
      #eq { display: none; }
    }
  </style>
</head>
<body>

<div id="card">
  <div id="bg"></div>
  <div id="bg-blur"></div>
  <div id="bg-overlay"></div>

  <div id="loading-state">
    <div class="spinner"></div>
    <p>Carregando rádio...</p>
  </div>

  <div id="iframe-wrap">
    <iframe id="spalla-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
  <div id="body" style="display:none;">
    <div id="meta">
      <div id="thumb-wrap">
        <img id="thumb" src="" alt="">
      </div>
      <div id="meta-text">
        <div id="radio-title"></div>
        <div id="radio-genre"></div>
        <span id="radio-category"></span>
      </div>
    </div>
    <div id="player-bar">
      <button id="play-btn" title="Play/Pause">
        <svg id="icon-play"  viewBox="0 0 24 24" fill="#0d0d1a"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" fill="#0d0d1a" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div id="live-section">
        <div id="live-dot"></div>
        <span id="live-label">LIVE</span>
      </div>
      <div id="eq">
        <div class="eq-bar stopped"></div>
        <div class="eq-bar stopped"></div>
        <div class="eq-bar stopped"></div>
        <div class="eq-bar stopped"></div>
        <div class="eq-bar stopped"></div>
        <div class="eq-bar stopped"></div>
      </div>
      <div id="vol-wrap">
        <svg id="vol-icon" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
    <div>
      <div id="desc-label">Descrição</div>
      <div id="desc-text"></div>
    </div>
  </div>
</div>
<audio id="audio" preload="none"></audio>
