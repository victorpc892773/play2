<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FF0033'/><polygon points='38,28 38,72 74,50' fill='white'/></svg>" />
<title>PLAYER | BBPLAY</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="//cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@3.2.0/dist/dash-shaka-playback.external.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --accent: #f5f500;
    --bg-deep: #0b0b10;
    --bg-side: #111118;
    --bg-fold: #0e0e14;
    --bg-item: #13131a;
    --border:  rgba(255,255,255,0.06);
    --text:    #c8c8d0;
    --side-w:  300px;
}

html, body {
    height: 100%;
    background: var(--bg-deep);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
}

#auth-screen {
    position: fixed; inset: 0;
    background: #0b0b12;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
}
.auth-card {
    text-align: center;
    width: min(320px, 88vw);
}
.auth-logo {
    font-size: 2.2rem;
    color: var(--accent);
    margin-bottom: 28px;
    display: block;
}
.auth-title {
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .5px;
    margin-bottom: 6px;
}
.auth-sub {
    color: #555;
    font-size: .75rem;
    margin-bottom: 32px;
}

.auth-bar {
    width: 100%;
    height: 2px;
    background: #1e1e2a;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 24px;
}
.auth-bar-fill {
    height: 100%;
    width: 40%;
    background: var(--accent);
    border-radius: 2px;
    animation: bar-slide 1.6s ease-in-out infinite;
}
@keyframes bar-slide {
    0%   { transform: translateX(-200%); }
    100% { transform: translateX(350%); }
}

.auth-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
}
.auth-dots span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    opacity: .25;
    animation: dot-pulse 1.4s ease-in-out infinite;
}
.auth-dots span:nth-child(2) { animation-delay: .22s; }
.auth-dots span:nth-child(3) { animation-delay: .44s; }
@keyframes dot-pulse {
    0%,80%,100% { opacity: .2; transform: scale(.8); }
    40%          { opacity: 1;  transform: scale(1.15); }
}

#app {
    display: none;
    height: 100dvh;
    width: 100%;
}
.layout {
    display: flex;
    height: 100dvh;
    width: 100%;
}

.sidebar {
    width: var(--side-w);
    min-width: var(--side-w);
    height: 100%;
    background: var(--bg-side);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-header {
    padding: 14px 16px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.sidebar-header span {
    color: var(--accent);
    font-weight: 800;
    font-size: .9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.sidebar-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
}
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-track { background: transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

.folder { border-bottom: 1px solid var(--border); }

.folder-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    color: var(--accent);
    font-weight: 700;
    font-size: .78rem;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    transition: background .18s;
    gap: 10px;
    text-align: left;
}
.folder-btn:hover { background: rgba(245,245,0,.07); }
.folder-btn .f-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.folder-btn .f-left span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.folder-btn i.icon { font-size: .85rem; width: 18px; text-align:center; flex-shrink:0; }
.folder-btn i.arrow { font-size: .65rem; transition: transform .55s cubic-bezier(.4,0,.2,1); flex-shrink:0; }
.folder-btn.open i.arrow { transform: rotate(90deg); }

.folder-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .6s cubic-bezier(.4,0,.2,1);
}
.folder-body.open { max-height: 2000px; }

.subfolder { border-top: 1px solid var(--border); }

.subfolder-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 10px 32px;
    color: #ccc;
    font-weight: 600;
    font-size: .75rem;
    letter-spacing: .6px;
    transition: background .18s;
    gap: 8px;
    text-align: left;
}
.subfolder-btn:hover { background: rgba(245,245,0,.06); }
.subfolder-btn .f-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
.subfolder-btn .f-left span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.subfolder-btn i.icon { font-size: .78rem; width:16px; text-align:center; color: var(--accent); flex-shrink:0; }
.subfolder-btn i.arrow { font-size: .6rem; transition: transform .5s cubic-bezier(.4,0,.2,1); flex-shrink:0; color: #666; }
.subfolder-btn.open i.arrow { transform: rotate(90deg); }

.subfolder-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .55s cubic-bezier(.4,0,.2,1);
}
.subfolder-body.open { max-height: 1200px; }

.ch-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px 9px 50px;
    cursor: pointer;
    color: #999;
    font-size: .74rem;
    border-left: 2px solid transparent;
    background: var(--bg-item);
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: all .15s;
}
.ch-item:hover { background: rgba(245,245,0,.07); color: #fff; }
.ch-item.active { background: rgba(245,245,0,.12); color: var(--accent); border-left-color: var(--accent); }
.ch-item i { font-size: .75rem; width:16px; text-align:center; flex-shrink:0; }

/* Direct channel (no subfolder) */
.ch-direct { padding-left: 36px; }

.player-area {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #0b0b10;
    overflow: hidden;
}

.player-wrap {
    position: relative;
    width: 100%;
    height: 55vh;
    background: #000;
    flex-shrink: 0;
    overflow: hidden;
}

#player {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
}
#player > div { width:100%!important; height:100%!important; }

.loading-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.82);
    display: flex; flex-direction:column;
    align-items: center; justify-content: center;
    gap: 12px;
    z-index: 20;
}
.loading-overlay.hidden { display: none; }
.loading-overlay p { color:#aaa; font-size:.8rem; }
.spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(245,245,0,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ch-info {
    padding: 10px 18px;
    background: #0d0d16;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
}
.ch-info h4 {
    display: flex; align-items: center; gap: 8px;
    font-size: .92rem; color: #eee; font-weight: 600;
}
.ch-info h4 i { color: var(--accent); }
.ch-info p { margin-top: 3px; font-size: .7rem; color: #666; display:flex; align-items:center; gap:6px; }
.live-dot {
    width: 7px; height: 7px;
    background: #e00; border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
@media (max-width: 768px) {
    html, body { overflow: hidden; }
    #app { overflow: hidden; }

    .layout {
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
    }

    .player-area {
        flex: none;
        height: auto;
        width: 100%;
        order: 1;
    }

    .player-wrap {
        height: 56.25vw;
        max-height: 56.25vw;
    }

    .sidebar {
        width: 100%;
        min-width: unset;
        flex: 1;
        height: 0;
        border-right: none;
        border-top: 1px solid var(--border);
        order: 2;
        overflow-y: auto;
        overflow-x: hidden;
    }

    .ch-info { padding: 7px 12px; flex-shrink: 0; }
    .ch-info h4 { font-size: .8rem; }
    .ch-info p  { font-size: .68rem; }

    .sidebar-header { padding: 10px 14px; }

    .folder-btn        { padding: 11px 14px; font-size: .76rem; }
    .subfolder-btn     { padding: 9px 14px 9px 28px; }
    .ch-item           { padding: 9px 12px 9px 44px; font-size: .73rem; }
    .ch-direct         { padding-left: 32px; }
}

body.embed-mode .sidebar,
body.embed-mode .ch-info   { display: none !important; }

body.embed-mode .layout    { position: relative; }

body.embed-mode .player-area {
    flex: 1;
    height: 100dvh !important;
    min-height: 100dvh !important;
}

body.embed-mode .player-wrap {
    width: 100% !important;
    height: 100dvh !important;
    max-height: 100dvh !important;
}

@media (max-width: 768px) {
    body.embed-mode .player-area {
        height: 100dvh !important;
    }
    body.embed-mode .player-wrap {
        height: 100dvh !important;
        max-height: 100dvh !important;
    }
}
</style>
</head>
<body>
<div id="auth-screen">
    <div class="auth-card">
        <i class="fas fa-tv auth-logo"></i>
        <p class="auth-title">Aguarde, carregando conteúdo</p>
        <p class="auth-sub" id="auth-status">Verificando credenciais...</p>
        <div class="auth-bar"><div class="auth-bar-fill"></div></div>
        <div class="auth-dots"><span></span><span></span><span></span></div>
        <div id="hcaptcha-container"></div>

</div>
<div id="app">
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span><i class="fas fa-satellite-dish"></i> &nbsp;Canais</span>

            <div class="sidebar-list" id="sidebar-list"></div>

        <main class="player-area">
            <div class="player-wrap">
                <div id="player"></div>
                <div id="loading-overlay" class="loading-overlay hidden">
                    <div class="spinner"></div>
                    <p>Carregando stream...</p>
                </div>
            </div>
            <div class="ch-info" id="ch-info">
                <h4><i class="fas fa-info-circle"></i> Nenhum canal selecionado</h4>
                <p>Escolha um canal na lista</p>
            </div>
        </main>

    </div>
</div>
