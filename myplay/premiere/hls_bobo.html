    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            background-color: black;
            color: white;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .gp-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInDown 0.7s ease both;
        }

        .gp-logo svg {
            width: 72px;
            height: 72px;
        }

        .progress-bar-wrap {
            width: 220px;
            height: 3px;
            background: #222;
            border-radius: 99px;
            overflow: hidden;
            animation: fadeIn 0.7s ease 0.3s both;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #cc0000, #ff1a1a, #ff4444);
            border-radius: 99px;
            animation: progressFill 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .ring-spinner {
            width: 64px;
            height: 64px;
            animation: fadeIn 0.7s ease 0.2s both;
        }

        .ring-spinner svg {
            width: 64px;
            height: 64px;
            animation: rotateSpin 1.4s linear infinite;
        }

        .ring-spinner svg circle {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 120;
            stroke-dashoffset: 80;
            stroke: url(#ringGrad);
        }

        .loading-text {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #666;
            letter-spacing: 0.5px;
            animation: fadeIn 0.7s ease 0.4s both, textPulse 2s ease-in-out infinite;
        }

        .dots span {
            display: inline-block;
            animation: dotBounce 1.2s ease-in-out infinite;
            color: #ff1a1a;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        #error-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9998;
            animation: fadeIn 0.5s ease both;
        }

        #error-overlay.visible {
            display: flex;
        }

        .error-icon svg {
            width: 64px;
            height: 64px;
            animation: fadeInDown 0.6s ease both;
        }

        .error-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            animation: fadeIn 0.6s ease 0.1s both;
        }

        .error-msg {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 13px;
            color: #666;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
            animation: fadeIn 0.6s ease 0.2s both;
        }

        .error-retry {
            margin-top: 8px;
            padding: 10px 28px;
            background: #e30000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.2s ease, transform 0.1s ease;
            animation: fadeIn 0.6s ease 0.3s both;
        }

        .error-retry:hover  { background: #cc0000; }
        .error-retry:active { transform: scale(0.97); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes rotateSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes progressFill {
            0%   { width: 0%;   opacity: 1; }
            70%  { width: 90%;  opacity: 1; }
            90%  { width: 95%;  opacity: 0.6; }
            100% { width: 100%; opacity: 0; }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50%       { opacity: 1;   }
        }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0);    }
            40%            { transform: translateY(-6px); }
        }
    </style>
</head>
