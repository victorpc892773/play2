    <style>
        :root {
            --dsn-blue:       #0063e5;
            --dsn-blue-mid:   #0480f5;
            --dsn-blue-light: #40a8ff;
            --dsn-deep:       #010b18;
            --dsn-glow:       rgba(4, 128, 245, 0.55);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: 'Outfit', sans-serif;
        }
        #dsn-loading {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--dsn-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(28px, 5vw, 44px);
            overflow: hidden;
            transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1),
                        visibility 0.7s cubic-bezier(0.4,0,0.2,1);
        }

        #dsn-loading.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #dsn-loading::before {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%; height: 200%;
            background-image:
                radial-gradient(1px   1px   at  8% 12%, rgba(255,255,255,.6)  0%, transparent 100%),
                radial-gradient(1px   1px   at 22% 68%, rgba(255,255,255,.3)  0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,.5)  0%, transparent 100%),
                radial-gradient(1px   1px   at 72% 52%, rgba(255,255,255,.35) 0%, transparent 100%),
                radial-gradient(1px   1px   at 88% 25%, rgba(255,255,255,.55) 0%, transparent 100%),
                radial-gradient(1px   1px   at 18% 88%, rgba(255,255,255,.25) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 63% 77%, rgba(255,255,255,.4)  0%, transparent 100%),
                radial-gradient(1px   1px   at 42% 42%, rgba(255,255,255,.3)  0%, transparent 100%),
                radial-gradient(1px   1px   at 80% 72%, rgba(255,255,255,.35) 0%, transparent 100%),
                radial-gradient(1px   1px   at  5% 50%, rgba(255,255,255,.2)  0%, transparent 100%),
                radial-gradient(1px   1px   at 35% 30%, rgba(255,255,255,.4)  0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 95% 60%, rgba(255,255,255,.45) 0%, transparent 100%);
            animation: star-drift 32s linear infinite;
            pointer-events: none;
        }
        #dsn-loading::after {
            content: '';
            position: absolute;
            bottom: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw; height: 45vw;
            max-height: 340px;
            border-radius: 50%;
            background: radial-gradient(ellipse, var(--dsn-glow) 0%, transparent 68%);
            animation: nebula-pulse 4.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes star-drift {
            from { transform: translateY(0); }
            to   { transform: translateY(25%); }
        }

        @keyframes nebula-pulse {
            0%, 100% { opacity: .55; transform: translateX(-50%) scale(1); }
            50%       { opacity: 1;   transform: translateX(-50%) scale(1.1); }
        }
        .dsn-play-wrap {
            position: relative;
            width:  clamp(88px, 20vw, 130px);
            height: clamp(88px, 20vw, 130px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .dsn-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2.5px solid transparent;
            border-top-color:   var(--dsn-blue-light);
            border-right-color: var(--dsn-blue);
            animation: ring-spin 1.1s cubic-bezier(.4,0,.2,1) infinite;
            filter: drop-shadow(0 0 9px var(--dsn-blue));
        }

        .dsn-ring2 {
            position: absolute;
            inset: 9px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-bottom-color: var(--dsn-blue-light);
            border-left-color:   rgba(64,168,255,.35);
            animation: ring-spin 1.8s cubic-bezier(.4,0,.2,1) infinite reverse;
        }

        .dsn-dots {
            position: absolute; inset: -6px;
            border-radius: 50%;
            animation: ring-spin 2.6s linear infinite;
        }

        .dsn-dot {
            position: absolute;
            width:  clamp(4px, 1vw, 6px);
            height: clamp(4px, 1vw, 6px);
            border-radius: 50%;
            background: var(--dsn-blue-light);
            box-shadow: 0 0 6px var(--dsn-blue-light);
        }
        .dsn-dot:nth-child(1) { top: 0;    left: 50%;  transform: translate(-50%, 0); }
        .dsn-dot:nth-child(2) { top: 50%;  left: 100%; transform: translate(-100%, -50%); }
        .dsn-dot:nth-child(3) { top: 100%; left: 50%;  transform: translate(-50%, -100%); }
        .dsn-dot:nth-child(4) { top: 50%;  left: 0;    transform: translate(0, -50%); }

        .dsn-play-bg {
            width: 60%; height: 60%;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 38%,
                rgba(4,128,245,.3) 0%,
                rgba(1,11,24,.88) 100%);
            border: 1px solid rgba(4,128,245,.28);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: glow-pulse 2.6s ease-in-out infinite;
        }

        .dsn-play-icon {
            width: 0; height: 0;
            border-style: solid;
            border-width: clamp(9px,2.2vw,14px) 0 clamp(9px,2.2vw,14px) clamp(15px,3.8vw,24px);
            border-color: transparent transparent transparent #ffffff;
            margin-left: 14%;
            filter: drop-shadow(0 0 7px rgba(255,255,255,.75));
            animation: icon-breathe 2.6s ease-in-out infinite;
        }

        @keyframes ring-spin { to { transform: rotate(360deg); } }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 18px var(--dsn-glow), 0 0 4px  rgba(64,168,255,.25) inset; }
            50%       { box-shadow: 0 0 42px var(--dsn-glow), 0 0 14px rgba(64,168,255,.5)  inset; }
        }

        @keyframes icon-breathe {
            0%, 100% { opacity: .7; }
            50%       { opacity: 1; }
        }
        .dsn-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 13px;
            z-index: 1;
        }

        .dsn-label {
            font-size:      clamp(10px, 2.2vw, 13px);
            font-weight:    300;
            letter-spacing: .45em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            animation: fade-in-up .9s ease both;
        }

        .dsn-bar-track {
            width:  clamp(130px, 32vw, 210px);
            height: 2px;
            background: rgba(255,255,255,.07);
            border-radius: 99px;
            overflow: hidden;
        }

        .dsn-bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--dsn-blue), var(--dsn-blue-light));
            box-shadow: 0 0 10px var(--dsn-blue);
            animation: bar-sweep 1.7s ease-in-out infinite;
        }

        .dsn-shimmer-row {
            display: flex;
            gap: 7px;
            align-items: center;
        }

        .dsn-s-dot {
            width:  clamp(4px, 1vw, 5px);
            height: clamp(4px, 1vw, 5px);
            border-radius: 50%;
            background: var(--dsn-blue-mid);
            animation: dot-pop 1.4s ease-in-out infinite;
        }
        .dsn-s-dot:nth-child(1) { animation-delay: 0s; }
        .dsn-s-dot:nth-child(2) { animation-delay: .22s; }
        .dsn-s-dot:nth-child(3) { animation-delay: .44s; }

        @keyframes bar-sweep {
            0%   { width: 0%;  margin-left: 0; }
            50%  { width: 55%; margin-left: 22%; }
            100% { width: 0%;  margin-left: 100%; }
        }

        @keyframes dot-pop {
            0%, 80%, 100% { opacity: .25; transform: scale(.8); }
            40%            { opacity: 1;   transform: scale(1.35); box-shadow: 0 0 6px var(--dsn-blue-light); }
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #player {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            height: 100%; width: 100%;
            border: 0;
            overflow: hidden;
        }
    </style>
</head>
