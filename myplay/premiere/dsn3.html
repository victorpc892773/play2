    <style>
        :root {
            --dsn-blue:       #0063e5;
            --dsn-blue-mid:   #0480f5;
            --dsn-blue-light: #40a8ff;
            --dsn-deep:       #010b18;
            --dsn-glow:       rgba(4,128,245,.55);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
        }
        #dsn-loading {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--dsn-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(28px, 5vw, 44px);
            overflow: hidden;
            will-change: opacity;
            transform: translateZ(0);
            transition: opacity .6s ease, visibility .6s ease;
        }
        #dsn-loading.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #dsn-nebula {
            position: absolute;
            bottom: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw; height: 45vw;
            max-height: 340px;
            border-radius: 50%;
            background: radial-gradient(ellipse, var(--dsn-glow) 0%, transparent 68%);
            animation: nebula-pulse 4.5s ease-in-out infinite;
            will-change: opacity, transform;
            pointer-events: none;
        }
        #dsn-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .dsn-play-wrap {
            position: relative;
            width:  clamp(88px, 20vw, 130px);
            height: clamp(88px, 20vw, 130px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .dsn-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2.5px solid transparent;
            border-top-color:   var(--dsn-blue-light);
            border-right-color: var(--dsn-blue);
            animation: ring-spin 1.1s cubic-bezier(.4,0,.2,1) infinite;
            will-change: transform;
            filter: drop-shadow(0 0 9px var(--dsn-blue));
        }
        .dsn-ring2 {
            position: absolute; inset: 9px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-bottom-color: var(--dsn-blue-light);
            border-left-color:   rgba(64,168,255,.35);
            animation: ring-spin 1.8s cubic-bezier(.4,0,.2,1) infinite reverse;
            will-change: transform;
        }
        .dsn-dots {
            position: absolute; inset: -6px;
            border-radius: 50%;
            animation: ring-spin 2.6s linear infinite;
            will-change: transform;
        }
        .dsn-dot {
            position: absolute;
            width:  clamp(4px,1vw,6px);
            height: clamp(4px,1vw,6px);
            border-radius: 50%;
            background: var(--dsn-blue-light);
            box-shadow: 0 0 6px var(--dsn-blue-light);
        }
        .dsn-dot:nth-child(1){ top:0;    left:50%;  transform:translate(-50%,0); }
        .dsn-dot:nth-child(2){ top:50%;  left:100%; transform:translate(-100%,-50%); }
        .dsn-dot:nth-child(3){ top:100%; left:50%;  transform:translate(-50%,-100%); }
        .dsn-dot:nth-child(4){ top:50%;  left:0;    transform:translate(0,-50%); }

        .dsn-play-bg {
            width:60%; height:60%;
            border-radius:50%;
            background: radial-gradient(circle at 38% 38%, rgba(4,128,245,.3) 0%, rgba(1,11,24,.88) 100%);
            border: 1px solid rgba(4,128,245,.28);
            display:flex; align-items:center; justify-content:center;
            animation: glow-pulse 2.6s ease-in-out infinite;
            will-change: box-shadow;
        }
        .dsn-play-icon {
            width:0; height:0;
            border-style:solid;
            border-width: clamp(9px,2.2vw,14px) 0 clamp(9px,2.2vw,14px) clamp(15px,3.8vw,24px);
            border-color: transparent transparent transparent #fff;
            margin-left:14%;
            filter: drop-shadow(0 0 7px rgba(255,255,255,.75));
            animation: icon-breathe 2.6s ease-in-out infinite;
            will-change: opacity;
        }
        .dsn-bottom {
            display:flex; flex-direction:column;
            align-items:center; gap:13px; z-index:1;
        }
        .dsn-label {
            font-size: clamp(10px,2.2vw,13px);
            font-weight:300; letter-spacing:.45em;
            text-transform:uppercase; color:rgba(255,255,255,.5);
            animation: fade-in-up .9s ease both;
        }
        .dsn-bar-track {
            width: clamp(130px,32vw,210px);
            height:2px; background:rgba(255,255,255,.07);
            border-radius:99px; overflow:hidden;
        }
        .dsn-bar-fill {
            height:100%; border-radius:99px;
            background: linear-gradient(90deg, var(--dsn-blue), var(--dsn-blue-light));
            box-shadow: 0 0 10px var(--dsn-blue);
            animation: bar-sweep 1.7s ease-in-out infinite;
            will-change: width, margin-left;
        }
        .dsn-shimmer-row { display:flex; gap:7px; align-items:center; }
        .dsn-s-dot {
            width: clamp(4px,1vw,5px); height: clamp(4px,1vw,5px);
            border-radius:50%; background:var(--dsn-blue-mid);
            animation: dot-pop 1.4s ease-in-out infinite;
            will-change: opacity, transform;
        }
        .dsn-s-dot:nth-child(1){ animation-delay:0s; }
        .dsn-s-dot:nth-child(2){ animation-delay:.22s; }
        .dsn-s-dot:nth-child(3){ animation-delay:.44s; }

        /* ── KEYFRAMES ── */
        @keyframes ring-spin   { to { transform: rotate(360deg); } }
        @keyframes nebula-pulse {
            0%,100% { opacity:.55; transform:translateX(-50%) scale(1); }
            50%      { opacity:1;   transform:translateX(-50%) scale(1.1); }
        }
        @keyframes glow-pulse {
            0%,100% { box-shadow: 0 0 18px var(--dsn-glow), 0 0 4px  rgba(64,168,255,.25) inset; }
            50%      { box-shadow: 0 0 42px var(--dsn-glow), 0 0 14px rgba(64,168,255,.5)  inset; }
        }
        @keyframes icon-breathe {
            0%,100% { opacity:.7; }
            50%      { opacity:1; }
        }
        @keyframes bar-sweep {
            0%   { width:0%;   margin-left:0; }
            50%  { width:55%;  margin-left:22%; }
            100% { width:0%;   margin-left:100%; }
        }
        @keyframes dot-pop {
            0%,80%,100% { opacity:.25; transform:scale(.8); }
            40%          { opacity:1;   transform:scale(1.35); box-shadow:0 0 6px var(--dsn-blue-light); }
        }
        @keyframes fade-in-up {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }
        #player {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            border: 0; overflow: hidden;
        }
        .dsn-unavail-icon {
            width:clamp(60px,14vw,84px); height:clamp(60px,14vw,84px);
            border-radius:50%;
            background: radial-gradient(circle at 38% 38%, rgba(4,128,245,.18) 0%, rgba(1,11,24,.9) 100%);
            border: 1.5px solid rgba(4,128,245,.3);
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 0 28px rgba(4,128,245,.25);
            animation: glow-pulse 3s ease-in-out infinite;
        }
        .dsn-unavail-title {
            font-size:clamp(16px,4vw,22px); font-weight:600;
            letter-spacing:.06em; color:rgba(255,255,255,.9);
            text-align:center;
        }
        .dsn-unavail-sub {
            font-size:clamp(12px,2.8vw,16px); font-weight:300;
            letter-spacing:.08em; color:rgba(255,255,255,.35);
            text-align:center;
        }
    </style>
</head>
