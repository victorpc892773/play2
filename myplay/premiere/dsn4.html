    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #040714;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            height: 100%;
            width: 100%;
            border: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #player.visible {
            opacity: 1;
        }

        #dsn-loader {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: #040714;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }

        #dsn-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #dsn-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 60% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 92% 25%, rgba(255,255,255,0.5) 0%, transparent 100%);
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes twinkle {
            0%   { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .dsn-logo {
            position: relative;
            width: 72px;
            height: 72px;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .dsn-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 18px rgba(17, 102, 238, 0.9));
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1);    filter: brightness(1); }
            50%       { transform: scale(1.07); filter: brightness(1.3); }
        }

        .dsn-bar-wrap {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .dsn-bar {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, #1166ee, #4db8ff, #1166ee);
            background-size: 200% 100%;
            animation: barShimmer 1.4s linear infinite;
            transition: width 0.4s ease;
        }

        @keyframes barShimmer {
            0%   { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .dsn-status {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #overlayLink {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }
    </style>
