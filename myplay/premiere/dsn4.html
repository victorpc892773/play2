    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            height: 100%;
            width: 100%;
            border: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #player.visible {
            opacity: 1;
        }

        #dsn-loader {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: #080808;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #dsn-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #dsn-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
        }

        .loader-ring-wrap {
            position: relative;
            width: 108px;
            height: 108px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-ring-wrap .track {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.07);
        }

        .loader-ring-wrap svg.spinner {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            animation: spinFast 1s cubic-bezier(0.4,0,0.2,1) infinite;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.35));
        }

        @keyframes spinFast {
            to { transform: rotate(360deg); }
        }

        .loader-ring-wrap svg.spinner2 {
            position: absolute;
            inset: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            animation: spinSlow 2.2s linear infinite reverse;
            opacity: 0.35;
        }

        @keyframes spinSlow {
            to { transform: rotate(360deg); }
        }

        .inner-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1e1e1e, #0d0d0d);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06),
                inset 0 1px 0 rgba(255,255,255,0.08),
                0 8px 32px rgba(0,0,0,0.6);
            animation: breathe 2.4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.6), 0 0 0 0 rgba(255,255,255,0.04); }
            50%       { box-shadow: 0 0 0 1px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.6), 0 0 28px 8px rgba(255,255,255,0.05); }
        }

        .inner-circle svg.play-icon {
            width: 28px;
            height: 28px;
            fill: rgba(255,255,255,0.92);
            margin-left: 4px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }
        .loader-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 2;
        }

        .loader-text {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.88);
            letter-spacing: 0.03em;
        }

        .loader-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .loader-bar-wrap {
            width: 130px;
            height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .loader-bar {
            height: 100%;
            width: 40%;
            border-radius: 99px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            animation: barSlide 1.6s ease-in-out infinite;
        }

        @keyframes barSlide {
            0%   { transform: translateX(-160px); }
            100% { transform: translateX(400px); }
        }
        #dsn-error {
            position: fixed;
            inset: 0;
            z-index: 9001;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        #dsn-error.visible {
            display: flex;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(220,50,50,0.15);
            border: 1.5px solid rgba(220,50,50,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon svg {
            width: 22px;
            height: 22px;
            fill: #e05555;
        }

        .error-title {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
        }

        .error-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
        }
        #overlayLink {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }
    </style>
