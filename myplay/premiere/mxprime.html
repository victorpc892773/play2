  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: white;
      font-family: 'Roboto', sans-serif;
      position: fixed;
    }
    
    #player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: #000000;
    }
    
    #player.show {
      display: block;
    }
    
    .poster-icon {
      overflow: visible;
      display: inline-block;
      transform: translateZ(0);
    }
    
    .poster-icon path {
      fill: #7c4dff !important;
      animation: pulse-fill 1.5s infinite;
      transform-origin: center;
    }
    
    @keyframes pulse-fill {
      0% {
        fill: #7c4dff;
        transform: scale(1);
      }
      50% {
        fill: #66b2ff;
        transform: scale(1.3);
      }
      100% {
        fill: #7c4dff;
        transform: scale(1);
      }
    }
    
    .media-control[data-media-control] .media-control-layer[data-controls] .bar-container[data-seekbar] .bar-background[data-seekbar] {
      height: 3px !important;
    }
    
    .media-control[data-media-control] .media-control-layer[data-controls] .bar-container[data-seekbar]:hover .bar-background[data-seekbar] {
      height: 5px !important;
    }
    
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0035 0%, #1a0052 50%, #000000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    #loading.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-logo {
      width: 200px;
      height: 80px;
      margin-bottom: 50px;
      position: relative;
      display: none;
    }
    
    .hbo-text {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -5px;
      background: linear-gradient(180deg, #b388ff 0%, #7c4dff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(179, 136, 255, 0.5);
      animation: glow-pulse 2s ease-in-out infinite;
      display: none;
    }
    
    @keyframes glow-pulse {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(179, 136, 255, 0.6));
      }
      50% {
        filter: drop-shadow(0 0 35px rgba(179, 136, 255, 0.9));
      }
    }
    
    .loading-spinner {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 30px 0;
    }
    
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #b388ff;
      border-right-color: #7c4dff;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    
    .spinner-ring:nth-child(2) {
      width: 90%;
      height: 90%;
      top: 5%;
      left: 5%;
      border-top-color: #9575cd;
      animation-delay: -0.3s;
    }
    
    .spinner-ring:nth-child(3) {
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
      border-top-color: #673ab7;
      animation-delay: -0.6s;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 30px;
      font-size: 18px;
      font-weight: 300;
      color: #b388ff;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fade-pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes fade-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    .loading-bar {
      width: 300px;
      height: 3px;
      background: rgba(179, 136, 255, 0.2);
      border-radius: 3px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }
    
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #b388ff 0%, #7c4dff 50%, #b388ff 100%);
      border-radius: 3px;
      animation: loading-progress 1.5s ease-in-out infinite;
      box-shadow: 0 0 15px rgba(179, 136, 255, 0.8);
    }
    
    @keyframes loading-progress {
      0% {
        width: 0%;
        margin-left: 0%;
      }
      50% {
        width: 75%;
        margin-left: 0%;
      }
      100% {
        width: 0%;
        margin-left: 100%;
      }
    }
    
    #error {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0035 0%, #1a0052 50%, #000000 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    #error.show {
      display: flex;
    }
    
    .error-icon {
      font-size: 80px;
      color: #ff5252;
      margin-bottom: 30px;
      animation: error-shake 0.5s ease-in-out;
    }
    
    @keyframes error-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    #error-message {
      font-size: 20px;
      color: #ff8a80;
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
    }
  </style>
