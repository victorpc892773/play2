<style>
  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --surface2: #141b22;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #ff4757;
    --accent3: #ffd32a;
    --text: #e8edf2;
    --muted: #c7ccd1;
    --live: #ff4757;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,12,16,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    gap: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo span {
    color: var(--text);
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .header-total {
    color: var(--accent);
    font-weight: 500;
  }

  /* ── SEARCH & FILTERS ── */
  .controls {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 28px auto 0;
    padding: 0 24px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px 14px 46px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: rgba(0,229,160,0.3); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* ── DAY SECTIONS ── */
  .content {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 28px auto 60px;
    padding: 0 24px;
  }

  .day-section { margin-bottom: 40px; }

  .day-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
  }

  .day-count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .day-line {
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    margin-bottom: 16px;
    opacity: 0.4;
  }

  /* ── GAME GRID ── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  /* ── GAME CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 3px 0 0 3px;
  }

  .card:hover {
    border-color: rgba(0,229,160,0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card:hover::before { opacity: 1; }

  /* Live card */
  .card.is-live {
    border-color: rgba(255,71,87,0.3);
    background: linear-gradient(135deg, rgba(255,71,87,0.04) 0%, var(--surface) 100%);
  }

  .card.is-live::before { background: var(--live); opacity: 1; }

  /* ── CARD TOP ROW ── */
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .campeonato {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .hora {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── JOGO ── */
  .jogo {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vs-sep {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .team { flex: 1; }
  .team:last-child { text-align: right; }

  /* ── CANAIS ── */
  .canais {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }

  .canal-tag {
    font-size: 11px;
    font-weight: 500;
    border-radius: 5px;
    padding: 4px 10px;
    border: 1px solid;
    line-height: 1;
    white-space: nowrap;
  }

  /* Canal color system */
  .canal-tag.sportv     { color: #00b4ff; border-color: rgba(0,180,255,0.3); background: rgba(0,180,255,0.08); }
  .canal-tag.espn       { color: #ff8c00; border-color: rgba(255,140,0,0.3); background: rgba(255,140,0,0.08); }
  .canal-tag.disney     { color: #b388ff; border-color: rgba(179,136,255,0.3); background: rgba(179,136,255,0.08); }
  .canal-tag.globo      { color: #ff6b6b; border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.08); }
  .canal-tag.youtube    { color: #ff4444; border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.08); }
  .canal-tag.dazn       { color: #00ff88; border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.08); }
  .canal-tag.cbt        { color: #ffd32a; border-color: rgba(255,211,42,0.3); background: rgba(255,211,42,0.08); }
  .canal-tag.tnt        { color: #ff6699; border-color: rgba(255,102,153,0.3); background: rgba(255,102,153,0.08); }
  .canal-tag.record     { color: #ff7043; border-color: rgba(255,112,67,0.3); background: rgba(255,112,67,0.08); }
  .canal-tag.band       { color: #40c4ff; border-color: rgba(64,196,255,0.3); background: rgba(64,196,255,0.08); }
  .canal-tag.cazé       { color: #69f0ae; border-color: rgba(105,240,174,0.3); background: rgba(105,240,174,0.08); }
  .canal-tag.default    { color: var(--muted); border-color: var(--border); background: var(--surface2); }

  /* ── LIVE BADGE ── */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--live);
    border: 1px solid rgba(255,71,87,0.4);
    background: rgba(255,71,87,0.1);
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 5px;
    height: 5px;
    background: var(--live);
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }

  /* ── LOADING ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 16px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .loader-ring {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY STATE ── */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  #empty .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  footer a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
  footer a:hover { opacity: 0.75; }

  .footer-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .footer-source { font-size: 11px; color: var(--muted); }
  .footer-divider { width: 40px; height: 1px; background: var(--border); margin: 2px 0; }
  .footer-copy { font-size: 11px; color: var(--muted); }
  .footer-links { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .footer-links span { color: var(--muted); opacity: 0.3; }

  /* ── COUNTER BADGE ── */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .results-count strong { color: var(--accent); }

  .update-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .header-inner { padding: 0; }
    .day-title { font-size: 24px; }
    .games-grid { grid-template-columns: 1fr; }
    .filters { gap: 6px; }
    .filter-label { display: none; }
  }
</style>
</head>
